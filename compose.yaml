services:
  projects-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: projects-db-container
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password123!"
      MSSQL_PID: "Developer"
    ports:
      - "1010:1433"
    volumes:
      - projects-db-volume:/var/opt/mssql

volumes:
  projects-db-volume: